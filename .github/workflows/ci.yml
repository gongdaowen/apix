name: CI

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.txt
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build:
    name: Build Validation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: bash
        run: |
          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}..."
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -v -ldflags="-s -w" -o apix-test.exe main.go
          else
            go build -v -ldflags="-s -w" -o apix-test main.go
          fi

      - name: Test binary execution (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x apix-test
          ./apix-test --help

      - name: Test binary execution (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./apix-test.exe --help

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: apix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: apix-test${{ matrix.goos == 'windows' && '.exe' || '' }}
          retention-days: 1
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true

  validate-spec:
    name: Validate OpenAPI Specs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          echo "Checking YAML syntax..."
          for file in *.yaml *.yml; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null || \
              echo "Warning: Could not validate $file (python3-yaml not available)"
            fi
          done
        continue-on-error: true
