openapi: 3.0.0
info:
  title: JSONPlaceholder API
  version: 1.0.0
  description: A simple API for testing
servers:
  - url: https://jsonplaceholder.typicode.com
paths:
  /posts:
    get:
      operationId: listPosts
      summary: List all posts
      parameters:
        - name: userId
          in: query
          required: false
          description: Filter by user ID
          schema:
            type: integer
      responses:
        '200':
          description: A list of posts
    post:
      operationId: createPost
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                body:
                  type: string
                userId:
                  type: integer
      responses:
        '201':
          description: Post created
  /posts/{id}:
    get:
      operationId: getPost
      summary: Get a post by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
      responses:
        '200':
          description: Post details